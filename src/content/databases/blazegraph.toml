license = "GPL-2.0"
type = "RDF"
query_languages = ["SPARQL", "Gremlin"]
category = "Established"
status = "inactive"
status_note = "Last release in 2019. Project largely dormant, though still used by Wikidata."
gdotv_support = true
gdotv_url = "https://gdotv.com/blazegraph-ide-graph-visualization-tool/"

