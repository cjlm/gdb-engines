slug = "frogql"
description = "An embedded single-file property graph database written in Rust that implements the ISO GQL standard and executes queries with worst-case-optimal Leapfrog Triejoin. It originates from PLEIAD's research on a gradual type system for GQL: its typechecker statically detects queries guaranteed to return no results before they run."
